<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字成績標準查詢</title>
<style>
  :root{
    --ink:#1c2b2d;
    --paper:#f4f7f6;
    --panel:#ffffff;
    --line:#d9e2e0;
    --accent:#1f6f6b;
    --accent-dark:#134f4c;
    --yellow:#fff3b0;
    --yellow-line:#e8d878;
    --muted:#6b7a79;
    --good:#1f6f6b;
    font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    padding:32px 16px 60px;
    line-height:1.5;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
  }
  header{
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    color:var(--accent);
    font-weight:700;
    text-transform:uppercase;
  }
  h1{
    font-size:28px;
    margin:6px 0 4px;
    letter-spacing:.01em;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
    margin-bottom:24px;
    box-shadow:0 1px 2px rgba(20,40,38,.04);
  }
  .panel h2{
    font-size:15px;
    margin:0 0 16px;
    color:var(--accent-dark);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel h2 .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .input-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
  }
  @media (max-width:560px){
    .input-grid{grid-template-columns:1fr;}
  }
  .field label{
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    display:block;
    margin-bottom:8px;
  }
  .field .hint{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
  }
  .num-row{
    display:flex;
    align-items:stretch;
    background:var(--yellow);
    border:1px solid var(--yellow-line);
    border-radius:10px;
    overflow:hidden;
  }
  .num-row input[type=number]{
    flex:1;
    border:none;
    background:transparent;
    padding:12px 14px;
    font-size:20px;
    font-weight:700;
    color:var(--ink);
    width:100%;
    outline:none;
    -moz-appearance: textfield;
  }
  .num-row input[type=number]::-webkit-outer-spin-button,
  .num-row input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;margin:0;
  }
  .unit{
    display:flex;
    align-items:center;
    padding:0 14px;
    font-size:13px;
    color:var(--accent-dark);
    font-weight:700;
    background:rgba(31,111,107,.08);
    border-left:1px solid var(--yellow-line);
  }
  input[type=range]{
    width:100%;
    margin-top:10px;
    accent-color:var(--accent);
  }

  .result-banner{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(135deg, var(--accent-dark), var(--accent));
    color:#fff;
    border-radius:14px;
    padding:20px 24px;
    margin-bottom:24px;
  }
  .result-banner .label{
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.85;
    margin-bottom:4px;
  }
  .result-banner .value{
    font-size:34px;
    font-weight:800;
  }
  .result-banner .formula{
    font-size:13px;
    opacity:.85;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
  }
  thead th{
    background:#e8f1f0;
    color:var(--accent-dark);
    font-weight:700;
    padding:10px 8px;
    text-align:center;
    border:1px solid var(--line);
    position:sticky;
    top:0;
  }
  tbody td{
    padding:10px 8px;
    text-align:center;
    border:1px solid var(--line);
  }
  tbody th{
    padding:10px 8px;
    text-align:center;
    border:1px solid var(--line);
    background:#f6f9f8;
    color:var(--accent-dark);
    font-weight:700;
  }
  tbody tr:nth-child(even) td{
    background:#fbfdfc;
  }
  .score{
    font-weight:700;
  }
  .score.na{
    color:var(--muted);
    font-weight:400;
  }
  .table-scroll{
    overflow-x:auto;
  }

  footer{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:32px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">打字檢定 · 成績對照</div>
    <h1>打字成績標準查詢</h1>
    <div class="sub">輸入打字速度與正確率，自動換算各級標準（S1–S6）在第一段、第二段、第三段的對應分數。</div>
  </header>

  <div class="panel">
    <h2><span class="dot"></span>在黃色欄位輸入數據</h2>
    <div class="input-grid">
      <div class="field">
        <label for="speed">速度（字 / 分鐘）</label>
        <div class="num-row">
          <input type="number" id="speed" value="8" step="0.5" min="0">
          <div class="unit">字/分</div>
        </div>
        <input type="range" id="speedRange" min="0" max="80" step="0.5" value="8">
      </div>
      <div class="field">
        <label for="accuracy">正確率</label>
        <div class="num-row">
          <input type="number" id="accuracy" value="100" step="1" min="0" max="100">
          <div class="unit">%</div>
        </div>
        <input type="range" id="accuracyRange" min="0" max="100" step="1" value="100">
      </div>
    </div>
  </div>

  <div class="result-banner">
    <div>
      <div class="label">速度 × 正確率</div>
      <div class="value" id="productValue">8.00</div>
    </div>
    <div class="formula" id="formulaText">8 字/分 × 100% = 8.00</div>
  </div>

  <div class="panel">
    <h2><span class="dot"></span>各級標準對應分數</h2>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>分數</th>
            <th>第一段</th>
            <th>第二段</th>
            <th>第三段</th>
          </tr>
        </thead>
        <tbody id="resultBody">
        </tbody>
      </table>
    </div>
  </div>

  <footer>依原始「2223打字標準」試算表之查詢邏輯（VLOOKUP 近似對照）重建。</footer>
</div>

const LEVELS = ["S1","S2","S3","S4","S5","S6"];
const SEGMENTS = ["seg1","seg2","seg3"];

// Replicates Excel VLOOKUP(lookup_value, range, 2, TRUE) approximate match:
// finds the largest key <= lookup_value from an ascending-sorted array of [key, value] pairs.
// Returns null if lookup_value is smaller than the smallest key (Excel would give #N/A).
function vlookupApprox(target, pairs){
  if(!pairs || pairs.length === 0) return null;
  if(target < pairs[0][0]) return null;
  let result = null;
  for(const [k,v] of pairs){
    if(k <= target){
      result = v;
    } else {
      break;
    }
  }
  return result;
}

const speedInput = document.getElementById('speed');
const speedRange = document.getElementById('speedRange');
const accInput = document.getElementById('accuracy');
const accRange = document.getElementById('accuracyRange');
const productValue = document.getElementById('productValue');
const formulaText = document.getElementById('formulaText');
const resultBody = document.getElementById('resultBody');

function syncPair(numEl, rangeEl){
  numEl.addEventListener('input', ()=>{ rangeEl.value = numEl.value; update(); });
  rangeEl.addEventListener('input', ()=>{ numEl.value = rangeEl.value; update(); });
}
syncPair(speedInput, speedRange);
syncPair(accInput, accRange);

function fmt(n){
  if(n === null || n === undefined) return null;
  return Math.round(n*100)/100;
}

function render(){
  resultBody.innerHTML = '';
  for(const s of LEVELS){
    const tr = document.createElement('tr');
    const th = document.createElement('th');
    th.textContent = s;
    tr.appendChild(th);

    for(const seg of SEGMENTS){
      const td = document.createElement('td');
      const pairs = LOOKUP[seg][s];
      if(!pairs){
        td.innerHTML = '<span class="score na">---</span>';
      } else {
        const product = currentProduct();
        const val = vlookupApprox(product, pairs);
        if(val === null){
          td.innerHTML = '<span class="score na">N/A</span>';
        } else {
          td.innerHTML = '<span class="score">' + val + '</span>';
        }
      }
      tr.appendChild(td);
    }
    resultBody.appendChild(tr);
  }
}

function currentProduct(){
  const speed = parseFloat(speedInput.value) || 0;
  const acc = (parseFloat(accInput.value) || 0) / 100;
  return speed * acc;
}

function update(){
  const speed = parseFloat(speedInput.value) || 0;
  const accPct = parseFloat(accInput.value) || 0;
  const product = currentProduct();
  productValue.textContent = fmt(product);
  formulaText.textContent = speed + ' 字/分 × ' + accPct + '% = ' + fmt(product);
  render();
}

update();
